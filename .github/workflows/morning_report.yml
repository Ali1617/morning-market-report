name: Morning Market Report

on:
  schedule:
    # 9:30 AM EDT (UTC-4) = 13:30 UTC  — weekdays only
    # Note: change to "30 14 * * 1-5" in November when clocks fall back to EST
    - cron: '30 13 * * 1-5'
  workflow_dispatch:   # lets you trigger it manually from GitHub anytime

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning report
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL:       ${{ secrets.REPORT_EMAIL }}
        run: python morning_report.py
