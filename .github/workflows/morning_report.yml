name: Morning Market Report

on:
  schedule:
    - cron: '30 12 * * 1-5'   # 12:30 UTC = 8:30 AM EDT (summer) / 7:30 AM EST (winter)
  workflow_dispatch:   # lets you trigger it manually from GitHub anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPORT_URL: https://ali1617.github.io/morning-market-report/

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run macro report
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL:       ${{ secrets.REPORT_EMAIL }}
        run: python forexfactory_report.py

      - name: Deploy report to GitHub Pages
        run: |
          git config user.name  "Ali1617"
          git config user.email "Ali1617@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "chore: update morning report $(date -u +'%Y-%m-%d')"
          git pull --rebase && git push
