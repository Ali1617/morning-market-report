name: Morning Market Report

on:
  schedule:
    # Runs at both possible UTC times for 8:30 AM ET
    # The script checks the actual ET time and exits early if it's not 8:30 AM
    - cron: '30 12 * * 1-5'   # 8:30 AM EDT (summer)
    - cron: '30 13 * * 1-5'   # 8:30 AM EST (winter)
  workflow_dispatch:   # lets you trigger it manually from GitHub anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run macro report
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL:       ${{ secrets.REPORT_EMAIL }}
        run: python forexfactory_report.py
